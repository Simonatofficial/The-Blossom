<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>The Blossom</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#1b1430">
  <link rel="icon" href="./icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/widgets.css">
  <link rel="stylesheet" href="./css/fab.css">
  <link rel="stylesheet" href="./css/weather.css">
</head>
<body>
  <canvas id="atmosphere-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>
  <main id="app" aria-live="polite"></main>
  <canvas id="fx-canvas"></canvas>
  <!-- Optional cloud sync (V2 §1). Both fail gracefully: the CDN client won't
       load offline, and ./config.js is absent until you create it — in either
       case sync.js disables itself silently and the app works fully offline. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  <script src="./config.js" defer onerror="window.BLOSSOM_CONFIG=window.BLOSSOM_CONFIG||{}"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
